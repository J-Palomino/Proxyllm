model_list:
  # Ollama models on hab (Tailscale) - tags verified present on the node
  - model_name: llama3.1:8b
    litellm_params:
      model: ollama/llama3.1:8b
      api_base: http://100.75.148.4:11434  # hab via Tailscale
    model_info:
      id: "hab-llama3.1-8b"

  - model_name: qwen3.5
    litellm_params:
      model: ollama/qwen3.5:latest
      api_base: http://100.75.148.4:11434  # hab via Tailscale
    model_info:
      id: "hab-qwen3.5"

  - model_name: glm-4.7-flash
    litellm_params:
      model: ollama/glm-4.7-flash:latest
      api_base: http://100.75.148.4:11434  # hab via Tailscale
    model_info:
      id: "hab-glm-4.7-flash"

  - model_name: glm4
    litellm_params:
      model: ollama/glm4:latest
      api_base: http://100.75.148.4:11434  # hab via Tailscale
    model_info:
      id: "hab-glm4"

  - model_name: gpt-oss:20b
    litellm_params:
      model: ollama/gpt-oss:20b
      api_base: http://100.75.148.4:11434  # hab via Tailscale
    model_info:
      id: "hab-gpt-oss-20b"

  - model_name: gemma3
    litellm_params:
      model: ollama/gemma3:latest
      api_base: http://100.75.148.4:11434  # hab via Tailscale
    model_info:
      id: "hab-gemma3"

  - model_name: internvl3.5:8b
    litellm_params:
      model: ollama/blaifa/InternVL3_5:8b
      api_base: http://100.75.148.4:11434  # hab via Tailscale
    model_info:
      id: "hab-internvl3.5-8b"

  # Wildcard support for any Ollama model on hab
  - model_name: "ollama/*"
    litellm_params:
      model: "ollama/*"
      api_base: http://100.75.148.4:11434  # hab via Tailscale

litellm_settings:
  drop_params: True
  num_retries: 3
  request_timeout: 600
  telemetry: False
  aiohttp_trust_env: True  # Enable HTTP_PROXY support for Tailscale

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  store_model_in_db: False
  database_url: os.environ/DATABASE_URL
  database_connection_pool_limit: 20
  database_connection_timeout: 60

  # IP Whitelist - Add your approved client IPs here
