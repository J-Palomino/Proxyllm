model_list:
  # Real Ollama model tags exposed per node (Tailscale + proxychains4).
  # hugo and hab share no model tags, so each model maps to the single node
  # that actually hosts it (no cross-node load balancing is possible yet).

  # --- hab models (100.75.148.4) ---
  - model_name: llama3.1:8b
    litellm_params:
      model: ollama/llama3.1:8b
      api_base: http://100.75.148.4:11434  # hab via Tailscale
    model_info:
      id: "hab-llama3.1-8b"

